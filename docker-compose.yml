services:
  redis:
    image: redis:7-alpine
    container_name: sharepoint-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  sharepoint-ai:
    build: .
    image: sharepoint-ai
    container_name: sharepoint-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      # Ensure critical variables are passed (override if needed)
      - AI_PROVIDER=${AI_PROVIDER}
      - TENANT_ID=${TENANT_ID}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - SITE_ID=${SITE_ID}
      # Redis — point to the redis service container
      - REDIS_URL=redis://redis:6379/0
      # CORS — restrict to your SharePoint tenant(s)
      - ALLOWED_SHAREPOINT_TENANTS=${ALLOWED_SHAREPOINT_TENANTS:-}

volumes:
  redis-data:
    driver: local
